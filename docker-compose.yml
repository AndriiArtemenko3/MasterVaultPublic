services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mastervault-db
    environment:
      POSTGRES_USER: mastervault
      POSTGRES_PASSWORD: mastervault
      POSTGRES_DB: mastervault
    ports:
      - "5433:5432"
    volumes:
      - mastervault-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastervault -d mastervault"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  mastervault-pgdata:
