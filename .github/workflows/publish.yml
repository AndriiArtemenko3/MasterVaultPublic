name: Publish to PyPI

# Runs only when a version tag is pushed, e.g. `git tag v0.1.0 && git push --tags`.
# Inert until then. Uses PyPI Trusted Publishing (OIDC): configure a trusted
# publisher for this repo at https://pypi.org/manage/project/mastervault/settings/publishing/
# (no API token needed once that is set up).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
