name: Publish to PyPI

# Runs only when a version tag is pushed, e.g. `git tag v0.2.0 && git push --tags`.
# Inert until then. Uses PyPI Trusted Publishing (OIDC): configure a trusted
# publisher for this repo at https://pypi.org/manage/project/mastervault/settings/publishing/
# (no API token needed once that is set up).
#
# SAFETY GATE: a tag cannot reach PyPI on an unverified commit. The `verify` job
# below runs the whole CI workflow against the tagged commit itself -- ruff,
# blocking mypy, the SQLite suite, the PostgreSQL/pgvector suite, the coverage
# floor, the retrieval and ask eval regression gates, and the package
# build/clean-install smoke test. `build` and `publish` both require it, so a
# failure anywhere in that suite stops the release.

on:
  push:
    tags: ["v*"]

# Least privilege by default; the publish job widens this for OIDC only. The
# reusable workflow called below inherits these, which is all `checkout` needs.
permissions:
  contents: read

jobs:
  # The complete mandatory suite, for this exact commit. Reusing CI via
  # workflow_call rather than duplicating its jobs means there is exactly one
  # definition of "verified" for both pull requests and releases.
  verify:
    name: verify (full CI suite)
    uses: ./.github/workflows/ci.yml

  build:
    name: build distribution
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    # `build` already implies `verify`, but naming both means dropping the gate
    # takes a deliberate edit here and not just an accident upstream.
    needs: [verify, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
