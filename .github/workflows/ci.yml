name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Callable so release automation can run this exact suite as a prerequisite
  # rather than restating it. `.github/workflows/publish.yml` gates PyPI
  # publication on this workflow succeeding for the tagged commit, which is
  # what keeps the release gate and the pull-request gate from drifting apart.
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The measured floor, over the honest denominator. SQLite-only runs at 83%
  # and the postgres job at 85% (0.2.0 baseline, 5579 statements); 82 leaves one
  # point of slack without letting real coverage loss through.
  #
  # These numbers replace an earlier 85/87 that were inflated: the coverage
  # `exclude_also` pattern for Protocol stub bodies was unanchored, so it also
  # matched `typer.Option(...)` defaults in multi-line signatures and coverage
  # excluded the WHOLE function -- 254 statements, including most of the
  # `mvault ask` / `ingest` / `review` command bodies, were missing from the
  # denominator. Raise this when the measured number rises; never lower it to
  # make a red build green.
  COVERAGE_FLOOR: "82"

jobs:
  test:
    name: lint + types + tests (sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify the lockfile is current
        run: uv lock --check

      - name: Install (with dev + rerank extras)
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy, blocking)
        run: uv run mypy src

      # Split so a failure names its tier in the CI log instead of hiding in one
      # 500-test run. --cov-append accumulates across the tiers; the floor is
      # asserted once at the end, over the union.
      - name: Unit tests
        run: uv run pytest -q tests/unit --cov --cov-report= --junitxml=junit-unit.xml

      - name: Integration tests (sqlite backend)
        run: uv run pytest -q tests/integration --cov --cov-append --cov-report= --junitxml=junit-integration.xml

      - name: Coverage report + regression floor
        run: |
          uv run coverage report
          uv run coverage report --fail-under="${COVERAGE_FLOOR}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-sqlite
          path: junit-*.xml
          if-no-files-found: ignore

  postgres:
    name: storage contract (postgres + pgvector)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mastervault
          POSTGRES_PASSWORD: mastervault
          POSTGRES_DB: mastervault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mastervault -d mastervault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # An ephemeral service container, created and destroyed with the job. The
      # suite still carves out its own throwaway database per session and its own
      # schema per test inside it (tests/conftest.py), so nothing here depends on
      # -- or can reach -- a developer's database.
      DATABASE_URL: postgresql://mastervault:mastervault@localhost:5432/mastervault
      # Turns "postgres unreachable -> skip" into a hard failure, and fails the
      # session if any postgres-backed test skipped anyway. Without this the job
      # would pass green while testing nothing.
      MV_REQUIRE_POSTGRES: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install (with dev + rerank extras)
        run: uv sync --all-extras

      - name: Backend contract tests (both backends, parametrized)
        run: uv run pytest -q tests/integration/test_storage_backends.py --junitxml=junit-backend.xml

      - name: Full suite against postgres
        run: uv run pytest -q --junitxml=junit-postgres.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgres
          path: junit-*.xml
          if-no-files-found: ignore

  eval:
    name: retrieval + ask eval regression gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Cache local embedding model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: fastembed-bge-small-en-v1.5

      - name: Load demo dataset (keyless, precomputed sidecar)
        run: |
          uv run mvault init
          uv run mvault demo load

      - name: Pristine demo mechanical lint
        run: uv run mvault lint --mechanical-only

      # Two gates, deliberately reported separately: `eval` grades retrieval
      # ranking, `ask-eval` grades the whole ask pipeline end to end. A single
      # merged number would move for either reason and mean neither.
      - name: Retrieval eval regression gate vs frozen baseline
        run: uv run mvault eval --compare datasets/larkstead/golden/baseline.json

      - name: End-to-end ask eval regression gate vs frozen baseline
        run: uv run mvault ask-eval --compare datasets/larkstead/golden/ask_baseline.json

  package:
    name: build + clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # Builds the sdist and wheel, scans both for workspaces/caches/secrets/
      # test output, installs the wheel into a clean venv, and runs a CLI smoke
      # flow (init -> sync -> search -> ask -> lint) from the installed artifact.
      - name: Build, scan and smoke-test the distributions
        run: ./scripts/check-package.sh

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
