# Larkstead corpus plan -- storyline + filler allocation
# Storyline doc tally derives from SL1-SL5 beat "produces" lists, mapped onto the
# target doc_type buckets as follows:
#   - SL1 macro-lot-2025-14-mat-warp (doc_type process) and SL2
#     sl2-macros-returns-helprise (doc_type sop) count as customer-support macros.
#   - SL4 vireo-flicker-troubleshooting-guide (doc_type faq) counts as troubleshooting;
#     vireo-help-doc-2024 and the SL2/SL5 FAQs count as faq-help.
#   - SL3 sl3-onepager-b2b-pricing and sl3-policy-b2b-tiers-v2 (sales-crm policy)
#     count as pricing-one-pagers; sl3-objection-note-price counts as objection-note.
#   - Ops logs split: SL1 receiving log -> receiving-log; SL4 firmware release
#     notes -> release-meeting-note. SL3/SL5 checklists -> onboarding-checklist.
#   - SL1 Verdant claim/response letters, exception memo, cost tally; SL2 memos;
#     SL3 pricing-exception memo; SL4 goodwill memo; SL5 dispute memo -> memo-org.
# Storyline docs total 89 (SL1 25, SL2 10, SL3 14, SL4 23, SL5 17). Filler 283.
# Corpus total 372 = 122 + 92 + 90 + 68.
#
# Filler guardrails (binding on writer agents):
#   - Do not restate, correct, or re-version any C1-C5 surface: the returns FAQ /
#     window, the LOT-2025-14 refund exception, the free-shipping threshold, the
#     B2B discount tiers (no percentages in filler sales docs), or Vireo warranty
#     terms. Filler proposals are all list-price deals below the tier minimums.
#   - Respect hire dates (Celeste Marin 2025-03-24, Yuki Tanaka 2025-08-11, Ray
#     Lindqvist 2024-04-01), SKU launch dates, and price_history effective dates.
#   - IDs minted by filler must not collide with IDs allocated in SL1-SL5 files.
#   - ID monotonicity: the HD ticket and #LS order counters are sequential, so
#     sorting every corpus ID by its in-world date must give ascending numbers
#     (HD counters reset each January 1; #LS never resets). The ledger is the
#     union of IDs allocated in SL1-SL5 plus the template exemplars. Mint filler
#     IDs in the gaps between dated allocations, never below a later-dated ID
#     or above an earlier-dated one. A mechanical checker sorts (date, ID)
#     pairs across the corpus and asserts monotonicity before writers finalize.
#   - Customer texture: at least half of filler ticket, chat, and CSAT
#     requesters must be one-off customers outside the 12-name repeat roster.
#     Mint plain two-part names, use each exactly once corpus-wide, and do not
#     reuse roster surnames. The roster anchors recognition; it does not
#     monopolize the queue.

