summary: >-
  Verdant Textiles lot LOT-2025-14 (1400 Alder desk mats, received 2025-06-19)
  carries an edge-stitch delamination defect: an adhesive cure oven ran low for
  one shift, and affected mats curl at the edges within weeks, faster in humid
  rooms. Support tickets trickle in through July, spike in early August, and
  reach 14 in total, including 5 delaminated mats at B2B account Stonebridge
  Accounting. Priya Raman flags the pattern to Dmitri Okafor, whose QA cull
  confirms 127 defective units of 1400 (9.07%); a support macro, a recall SOP,
  and a formal claim against Verdant follow. Verdant credits 1638.30 against
  INV-VRD-2025-118, declines the 203.20 freight claim, signs a QC addendum on
  2025-09-12, and Ana Petrova closes the books at 418.05 net cost on 2025-09-26.
