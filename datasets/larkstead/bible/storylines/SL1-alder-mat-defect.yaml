# SL1 -- Alder mat warping defect (Verdant Textiles LOT-2025-14)
# Derived from company.yaml. Reconciliations vs. the original storyline sketch:
#   - lot is LOT-2025-14 (company.yaml VEN-01 notes), not LOT-2025-03
#   - invoice is INV-VRD-2025-118 (Verdant invoice_code VRD), not INV-VER-*
#   - window starts at lot receipt 2025-06-19, not 2025-03
# Arithmetic spine (checkers verify these):
#   INV-VRD-2025-118: 1400 units x 12.90 = 18060.00, dated 2025-06-24, Net-45, due 2025-08-08
#   landed unit cost 14.50 = 12.90 vendor price + 1.60 freight/receiving per unit
#   defective total 127 of 1400 (9.07%): 109 warehouse cull + 18 field (13 B2C + 5 Stonebridge)
#   credit memo 1638.30 = 127 x 12.90; freight claim 203.20 = 127 x 1.60, declined
#   demand total 1841.50 = 1638.30 + 203.20 = 127 x 14.50
#   adjusted payable 16421.70 = 18060.00 - 1638.30, ACH 2025-09-05
#   gross program cost 2056.35 = refunds 129.90 (2 x 64.95) + replacement stock 232.00
#     (16 x 14.50) + outbound 113.95 (11 parcels x 7.40 = 81.40, plus 32.55 Stonebridge
#     batch) + scrap write-off 1580.50 (109 x 14.50)
#   net cost 418.05 = 2056.35 - 1638.30
#   single-mat B2C order total 64.95 = 59.00 list + 5.95 US-1 light shipping, OR tax 0.0
#   Stonebridge add-on order 295.00 = 5 x 59.00, free shipping (over 75.00), OR tax 0.0

