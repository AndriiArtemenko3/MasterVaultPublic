          - "Eleventh flicker ticket overall."
        length_words: {min: 120, max: 260}
      - doc_id: "hd-2026-00136-silva-flicker"
        domain: "customer-support"
        doc_type: "ticket"
        in_world_date: "2026-01-14"
        author: "Jonah Beck"
        required_facts:
          - "Ticket HD-2026-00136, customer Ruben Silva, order #LS32015 placed 2025-12-20, 1x LS-LMP-001 at 149.00."
          - "Lamp lives in a dorm with unreliable Wi-Fi and missed the rollback window."
          - "Jonah applies the manual update-check path from the rollback SOP; unit restores to v1.1 on the call."
          - "Twelfth and final flicker ticket of the incident."
        length_words: {min: 120, max: 260}

  - beat: 10
    date: "2026-01-20"
    event: >-
      Mara Voss issues a goodwill warranty extension memo: 2 years for
      vireo-v12-affected units, effective 2026-01-20. The memo assigns a help
      doc update to support that never happens, seeding contradiction C4.
    produces:
