        domain: "operations"
        doc_type: "sop"
        in_world_date: "2026-01-09"
        author: "Dmitri Okafor"
        required_facts:
          - "Restore path: Bitgrove pins the OTA channel to a signed firmware v1.1 image for all Meridian PCB rev C serials (lots LOT-2025-31 and LOT-2025-38)."
          - "Staged execution 09 Jan through 13 Jan 2026; 618 units on v1.2 in scope."
          - "Units must be powered and on Wi-Fi to receive the rollback; support script for walking customers through a manual update check included."
          - "Result recorded at close: 592 of 618 units restored to v1.1 by 13 Jan; 26 units offline, flagged for an outreach email via Mailloft."
          - "Escalation path: unresolved units go to a replacement swap under warranty, referencing the customer's HD ticket."
        length_words: {min: 350, max: 600}

  - beat: 9
    date: "2026-01-12"
    event: >-
      Trailing tickets arrive from units that were offline during the rollback
      window and had not received the v1.1 restore.
    produces:
