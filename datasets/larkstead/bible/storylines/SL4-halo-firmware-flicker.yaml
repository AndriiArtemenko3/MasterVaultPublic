          - "Warranty extended to 2 years for Vireo units in scope vireo-v12-affected, effective 2026-01-20."
          - "Scope: the 618 LS-LMP-001 units on Meridian PCB rev C that received firmware v1.2; all other Vireo units stay on the 1 year standard warranty (effective 2024-01-15)."
