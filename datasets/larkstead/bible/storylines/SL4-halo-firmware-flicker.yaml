        domain: "customer-support"
        doc_type: "ticket"
        in_world_date: "2025-12-19"
        author: "Celeste Marin"
        required_facts:
          - "Ticket HD-2025-05511, Sam Ortiz (office manager, Cobalt Dental Group): the two LS-LMP-001 add-on units on B2B order #LS31695 (line 2 of the signed deal, 2x 149.00 = 298.00 at list), delivered with wave 1 on 2025-12-10."
          - "Both units flicker during the evening dim in the two windowless back offices; account is PW-cobalt-dental-40seat, flagged for Tom Aldridge."
          - "Celeste quotes the warranty policy: 1 year standard, effective 2024-01-15, and applies the disable-sleep-dim workaround."
          - "Internal note: seventh flicker ticket overall; B2B flagship account, handle with priority."
        length_words: {min: 140, max: 280}
      - doc_id: "bitgrove-bug-report-flicker-01"
        domain: "operations"
        doc_type: "bug-report"
        in_world_date: "2025-12-19"
        author: "Dmitri Okafor"
        required_facts:
          - "Filed with Bitgrove Labs (VEN-03) on 2025-12-19 against firmware v1.2 (released 2025-12-09)."
          - "Repro steps: (1) LS-LMP-001 with Meridian PCB rev C on v1.2, (2) enable sleep-mode dim schedule, (3) set brightness below 20 percent, (4) flicker at roughly 0.5 Hz appears within 30 seconds."
          - "Affected hardware: Meridian Components (VEN-07) PCB rev C, lots LOT-2025-31 (400 units, received 22 Sep) and LOT-2025-38 (350 units, received 17 Nov); 750 rev C units total."
          - "7 tickets to date; rev B units on v1.2 do not reproduce the flicker."
          - "Ask: root-cause analysis plus a rollback option to v1.1 for rev C units."
        length_words: {min: 250, max: 450}

  - beat: 6
    date: "2025-12-22"
    event: >-
      Priya publishes a customer-facing troubleshooting guide with the
      confirmed workaround while Bitgrove investigates.
    produces:
      - doc_id: "vireo-flicker-troubleshooting-guide"
        domain: "customer-support"
        doc_type: "faq"
        in_world_date: "2025-12-22"
        author: "Priya Raman"
        required_facts:
          - "Applies to LS-LMP-001 units purchased October 2025 or later running firmware v1.2."
          - "Symptom: slow visible flicker (about one pulse every 2 seconds) when sleep-mode dimming goes below 20 percent brightness."
          - "Workaround: open the Vireo app, Settings, Sleep schedule, toggle sleep-mode dimming off; flicker stops immediately."
          - "Not a power problem: swapping the LS-ACC-012 power adapter does not change the behavior."
          - "A firmware fix is in progress with the firmware vendor; affected customers can reply to their existing HD ticket for updates."
        length_words: {min: 300, max: 550}

  - beat: 7
    date: "2026-01-03"
    event: >-
      A second wave of tickets arrives after the holidays from December buyers,
      and Dmitri sends Bitgrove a follow-up bug report with log captures that
      narrow the root cause.
    produces:
      - doc_id: "hd-2026-00041-feld-flicker"
        domain: "customer-support"
        doc_type: "ticket"
        in_world_date: "2026-01-03"
        author: "Jonah Beck"
        required_facts:
          - "Ticket HD-2026-00041, customer Nora Feld, order #LS31921 placed 2025-12-11, 1x LS-LMP-001 at 149.00."
          - "Flicker below 20 percent brightness on firmware v1.2; matches the published troubleshooting guide."
          - "Jonah links the troubleshooting guide and applies the disable-sleep-dim workaround."
          - "Eighth flicker ticket overall; tagged vireo-flicker."
        length_words: {min: 120, max: 260}
      - doc_id: "hd-2026-00057-hutchins-flicker"
        domain: "customer-support"
        doc_type: "ticket"
        in_world_date: "2026-01-05"
        author: "Celeste Marin"
        required_facts:
          - "Ticket HD-2026-00057, customer Dale Hutchins (one-off buyer, first Larkstead order), order #LS31940 placed 2025-12-13, 1x LS-LMP-001 at 149.00."
          - "Customer found the troubleshooting guide himself; workaround holds but he wants the dim schedule back."
          - "Celeste confirms a vendor fix is in progress and quotes the 1 year standard warranty, effective 2024-01-15."
          - "Ninth flicker ticket overall."
        length_words: {min: 120, max: 260}
      - doc_id: "bitgrove-bug-report-flicker-02"
        domain: "operations"
        doc_type: "bug-report"
        in_world_date: "2026-01-06"
        author: "Dmitri Okafor"
        required_facts:
          - "Follow-up to bitgrove-bug-report-flicker-01, sent 2026-01-06 with debug log captures from 3 customer units."
          - "Root cause narrowed: v1.2 sleep-timer wake interrupt collides with the rev C LED driver PWM cycle at duty below 20 percent, producing the 0.5 Hz flicker."
          - "9 tickets by 06 Jan against 618 rev C units confirmed on v1.2."
          - "Ask: signed v1.1 image pinned to the OTA channel for rev C serials as an interim rollback; hotfix to follow."
        length_words: {min: 250, max: 450}
      - doc_id: "hd-2026-00089-cole-flicker"
        domain: "customer-support"
        doc_type: "ticket"
        in_world_date: "2026-01-08"
        author: "Jonah Beck"
        required_facts:
          - "Ticket HD-2026-00089, customer Desmond Cole, order #LS31968 placed 2025-12-16, 1x LS-LMP-001 at 149.00, bought as a gift."
          - "Gift recipient reports the flicker; Desmond asks whether a return is possible instead of a fix."
          - "Jonah explains the 45-day refund window (effective 2025-11-03) still covers the order and offers the workaround as an alternative."
          - "Tenth flicker ticket overall; customer opts to wait for the fix."
        length_words: {min: 120, max: 260}

  - beat: 8
    date: "2026-01-09"
    event: >-
      Ops executes the rollback: Bitgrove pins the OTA channel for rev C
      serials to a signed v1.1 image and Dmitri publishes the rollback SOP that
