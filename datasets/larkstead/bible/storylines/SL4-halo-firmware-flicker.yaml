# SL4 -- Vireo firmware v1.2 flicker bug
# Derives from company.yaml (single source of truth). Note: company.yaml names the
# hotfix v1.3 (shipped 2026-02-17), so this storyline uses v1.3, not v1.2.1.
# Dates force the goodwill memo (2026-01-20) before the hotfix release (2026-02-17).
# Beat 1 sits outside the window on purpose: it plants the stale help doc for C4.

storyline: SL4
slug: vireo-firmware-flicker
title: "Vireo firmware v1.2 flicker bug"
window:
  start: "2025-10-01"
  end: "2026-02-28"
summary: >-
  Bitgrove Labs ships Vireo firmware v1.2 over the air on 2025-12-09 and units
  built on Meridian PCB rev C (lots LOT-2025-31 and LOT-2025-38, sold from
  October 2025) start flickering at about 0.5 Hz whenever sleep-mode dimming
  drops below 20 percent brightness. Twelve support tickets land between
  2025-12-11 and 2026-01-14; Jonah Beck escalates, Dmitri Okafor files two bug
  reports with Bitgrove, support publishes a workaround guide, and ops executes
  a staged v1.1 rollback on 2026-01-09 that restores 592 of 618 exposed units.
  Mara Voss grants a 2-year goodwill warranty for affected units effective
  2026-01-20, Ana Petrova papers a 4,800.00 SOW amendment with Bitgrove, and
  hotfix v1.3 ships 2026-02-17 with a postmortem to follow. The 2024 Vireo help
  doc still says 1-year warranty and is never updated (contradiction C4).

