# Shared numeric canon for every SL4 doc writer:
#   v1.2 OTA release 2025-12-09; v1.3 hotfix release 2026-02-17.
#   Rev C population: 400 (LOT-2025-31) + 350 (LOT-2025-38) = 750 units.
#   Units that took v1.2 before the rollback: 618. Restored to v1.1 by
#   2026-01-13: 592. Offline and unreachable at rollback close: 26 (618 - 592).
#   Ticket totals over time: 6 by 2025-12-17, 7 by 2025-12-19, 9 by 2026-01-06,
#   12 final. 12 / 618 = 1.9 percent ticket rate.
#   Symptom: visible flicker at roughly 0.5 Hz when sleep-mode dimming goes
#   below 20 percent brightness; only on Meridian PCB rev C running v1.2.

contradictions:
  - id: C4
    stale_doc: "vireo-help-doc-2024"
    current_doc: "vireo-goodwill-warranty-memo"
    stale_claim: "The Vireo smart desk lamp (LS-LMP-001) is covered by a 1-year warranty from delivery."
    current_claim: "Vireo units that ran firmware v1.2 (scope vireo-v12-affected) carry a 2-year warranty, effective 2026-01-20."
    truth: >-
      Both claims are true in their own scope, but the help doc is stale. The
      2026-01-20 goodwill memo extends warranty to 2 years only for the 618
      vireo-v12-affected units (Meridian PCB rev C units that received firmware
      v1.2); every other Vireo unit keeps the 1-year standard warranty effective
      2024-01-15. The memo assigned Priya Raman to update the public help doc
      and that update never happened, so the help doc still states 1 year for
      all units with no mention of the extension.

beats:
  - beat: 1
    date: "2024-10-20"
    pre_window: true   # deliberate background beat before window.start; plants the stale help doc for C4
    event: >-
      Support publishes the Vireo product help doc five days after launch. It
      states the 1-year standard warranty and is never revised afterward,
      which seeds contradiction C4.
    produces:
      - doc_id: "vireo-help-doc-2024"
        domain: "customer-support"
        doc_type: "faq"
        in_world_date: "2024-10-20"
        author: "Priya Raman"
        required_facts:
          - "Vireo smart desk lamp is SKU LS-LMP-001, launched 2024-10-15, list price 149.00."
          - "Warranty: 1 year from delivery, per the standard warranty policy effective 2024-01-15."
          - "Firmware updates arrive over the air; the lamp checks for updates when connected to Wi-Fi."
          - "Returns follow the standard refund window; opened non-defective returns carry a 10 percent restocking fee."
          - "Support contact: helpdesk (Helprise); customers should include their #LS order number."
        length_words: {min: 350, max: 600}

  - beat: 2
    date: "2025-12-09"
    event: >-
      Bitgrove Labs releases Vireo firmware v1.2 over the air. Ops publishes the
      release notes; the staged rollout reaches 100 percent of connected units
      within four days.
    produces:
      - doc_id: "vireo-fw-v12-release-notes"
        domain: "operations"
        doc_type: "log"
        in_world_date: "2025-12-09"
        author: "Dmitri Okafor"
        required_facts:
          - "Firmware v1.2 released 2025-12-09 via the Bitgrove Labs (VEN-03) OTA service."
          - "Changes: reworked sleep-mode dimming schedule and ambient sensor recalibration."
          - "Applies to all LS-LMP-001 units; staged rollout 20 percent on 09 Dec, 50 percent on 11 Dec, 100 percent on 13 Dec."
          - "No hardware revisions called out in the release package."
        length_words: {min: 150, max: 300}

  - beat: 3
    date: "2025-12-11"
    event: >-
      Flicker tickets start two days after the v1.2 rollout begins. Six tickets
      arrive between 2025-12-11 and 2025-12-17, all from units sold October
      2025 or later.
    produces:
      - doc_id: "hd-2025-05402-whitfield-flicker"
