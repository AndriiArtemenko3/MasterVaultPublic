          - "Ticket HD-2025-05402, customer Sam Whitfield, order #LS31408 placed 2025-10-02, 1x LS-LMP-001 at 149.00."
          - "Lamp flickers visibly when sleep-mode dimming drops below 20 percent brightness; started 2025-12-10 evening."
          - "Customer has light sensitivity (accessibility segment); flicker triggers headaches, so the lamp is unplugged."
          - "Jonah confirms firmware shows v1.2 in the Vireo app; no fix known yet, apologizes twice."
