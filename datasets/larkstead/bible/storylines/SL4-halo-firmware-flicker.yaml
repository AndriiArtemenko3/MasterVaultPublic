          - "Action item: Priya Raman to update the public Vireo help doc to reflect the extension. (Corpus note: this update never ships; the help doc stays at 1 year.)"
          - "Memo in Mara's voice: short declaratives, signed M, closes with one pointed question about the offline 26 units."
        length_words: {min: 200, max: 350}

  - beat: 11
    date: "2026-01-26"
    event: >-
      Ana Petrova executes SOW Amendment No. 2 with Bitgrove Labs covering the
      hotfix, the signed rollback image, and 90 days of post-release
      monitoring. Mara approved the spend on 2026-01-23.
    produces:
      - doc_id: "bitgrove-sow-amendment-2"
        domain: "internal-admin"
        doc_type: "contract"
        in_world_date: "2026-01-26"
