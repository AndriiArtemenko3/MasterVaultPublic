# Mechanical checkers grep every corpus document against these.
id_grammars:
  sku:
    regex: "LS-(DSK|CHR|MAT|LMP|STD|ARM|ACC|BDL)-[0-9]{3}(-[A-Z0-9]{2,3})?"
    example: "LS-DSK-001-60"
  ticket:
    regex: "HD-[0-9]{4}-[0-9]{5}"
    example: "HD-2025-04182"
  invoice:
    regex: "INV-[A-Z]{3}-[0-9]{4}-[0-9]{3}"
    example: "INV-VRD-2025-118"
  customer_order:
    regex: "#LS[0-9]{5}"
    example: "#LS20841"
  vendor:
    regex: "VEN-[0-9]{2}"
    example: "VEN-07"
  production_lot:
    regex: "LOT-[0-9]{4}-[0-9]{2}"
    example: "LOT-2025-14"
  crm_opportunity:
    regex: "PW-[a-z0-9]+(-[a-z0-9]+)*"
    example: "PW-cobalt-dental-40seat"

