# Larkstead Goods Co. -- dataset bible
# Single source of truth for every corpus writer and mechanical checker.
# Every date, price, and ID in the corpus must trace back to this file.
# Corpus window: 2024-01 through 2026-06. Fully fictional company. No real brands anywhere.

company:
  name: "Larkstead Goods Co."
  legal_name: "Larkstead Goods Company, LLC (Oregon)"
  founded: "2022-06-01"
  hq: "Portland, Oregon, USA"
  positioning: >-
    Larkstead sells ergonomic home-office furniture and accessories, direct to
    consumers since 2022 and to small businesses outfitting 8-60 seat offices
    since mid-2024. The catalog is small on purpose: one desk platform, one
    chair, and a parts shelf deep enough that customers repair instead of replace.
  revenue_by_year:
    "2024": 1134900
    "2025": 2417800
  b2b_share_2026: 0.35
  channels:
    - "DTC web store (Shopstack)"
    - "B2B direct sales (Pipewell pipeline)"
    - "Showroom pickup, Portland"

tools:
  - {name: "Shopstack", category: "storefront", real_world_analog_category: "e-commerce storefront platform"}
  - {name: "Helprise", category: "helpdesk", real_world_analog_category: "customer support helpdesk platform"}
  - {name: "Pipewell", category: "CRM", real_world_analog_category: "sales CRM"}
  - {name: "Ledgerly", category: "accounting", real_world_analog_category: "small-business accounting software"}
  - {name: "ParcelPoint", category: "3PL portal", real_world_analog_category: "third-party logistics and fulfillment provider"}
  - {name: "Mailloft", category: "email marketing", real_world_analog_category: "email marketing platform"}

# Voice cards are binding on writer agents. A reader who knows the cards should
# be able to guess the author of any internal document blind.
staff:
  - name: "Mara Voss"
    role: "Founder / CEO"
    initials: "MV"
    email: "mara@larkstead.example"
    hired: "2022-06-01"
    voice:
      - "short declaratives, rarely over 15 words"
      - "opens internal mail with the ask, no greeting"
      - "closes most messages with one pointed question"
    quirks: "signs internal messages with just M"
  - name: "Dmitri Okafor"
    role: "Operations lead"
    initials: "DO"
    email: "dmitri@larkstead.example"
    hired: "2022-08-15"
    voice:
      - "number first, context second"
      - "keeps running dated logs inside updates (03 Jun: carrier swap confirmed)"
      - "spells out units: 14 pallets, 96 cartons, never just 14"
    quirks: "writes dates as 03 Jun, never 6/3"
  - name: "Priya Raman"
    role: "Support lead"
    initials: "PR"
    email: "priya@larkstead.example"
    hired: "2023-01-09"
    voice:
      - "warm, short paragraphs, customer's first name in line one"
      - "restates the problem before giving the fix, never blames the customer"
      - "internal notes drop to terse fragments"
    quirks: "calls the team folks"
  - name: "Jonah Beck"
    role: "Support agent"
    initials: "JB"
    email: "jonah@larkstead.example"
    hired: "2024-02-12"
    voice:
      - "long sentences that run on when the queue is deep"
      - "over-apologizes, often twice in one reply"
      - "casual register bleeds into customer replies (gonna, no worries)"
    quirks: "types tho and gonna in internal chat"
  - name: "Celeste Marin"
    role: "Support agent"
    initials: "CM"
    email: "celeste@larkstead.example"
    hired: "2025-03-24"
    voice:
      - "quotes policy verbatim and always includes the effective date"
      - "short paragraphs, one topic per paragraph"
      - "asks for the order number before anything else"
    quirks: "links the policy page in nearly every reply"
  - name: "Tom Aldridge"
    role: "Sales lead (B2B)"
    initials: "TA"
    email: "tom@larkstead.example"
    hired: "2024-06-03"
    voice:
      - "leads with the dollar figure or seat count"
      - "heavy use of first names, drops surnames after first contact"
      - "keeps emails under 120 words"
    quirks: "closes asks with fair enough?"
  - name: "Yuki Tanaka"
    role: "Account executive"
    initials: "YT"
    email: "yuki@larkstead.example"
    hired: "2025-08-11"
    voice:
      - "formal register in external mail, no contractions"
      - "numbered next-steps list at the end of every client email"
      - "absolute dates only, never says next week"
    quirks: "confirms every call in writing within the hour"
  - name: "Sofia Grieg"
    role: "Marketing"
    initials: "SG"
    email: "sofia@larkstead.example"
    hired: "2023-05-15"
    voice:
      - "punchy fragments in draft copy"
      - "asks for the metric before giving an opinion"
      - "subject lines under 6 words"
    quirks: "names campaigns after weather (Drizzle, Chinook, Squall)"
  - name: "Hank Morrow"
    role: "Warehouse lead"
    initials: "HM"
    email: "hank@larkstead.example"
    hired: "2022-10-03"
    voice:
      - "terse, often single-line messages"
      - "all lowercase in chat"
      - "exact measurements, down to the half inch"
    quirks: "refers to shipments by carrier plus weekday (the tuesday cascadia load)"
  - name: "Ana Petrova"
    role: "Finance / admin (part-time)"
    initials: "AP"
    email: "ana@larkstead.example"
    hired: "2023-09-05"
    voice:
      - "conditional phrasing: if the invoice clears by Friday, then"
      - "cites invoice and order IDs inline"
      - "rounds nothing, gives cents"
    quirks: "puts [APPROVAL] in the subject for anything at or over policy thresholds"
  - name: "Ray Lindqvist"
    role: "Contract Shopstack developer"
    initials: "RL"
    email: "ray@larkstead.example"
    hired: "2024-04-01"
    voice:
      - "commit-message style updates: fix cart tax rounding on WA orders"
      - "references ticket IDs in every status note"
      - "no greetings, no sign-offs"
    quirks: "responds only Tuesdays and Thursdays per contract"

