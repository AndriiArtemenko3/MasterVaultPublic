# THE CONTRADICTION ENGINE. Every policy is a version list; the entry in force
# on a document's date governs that document. Later documents may contradict
# earlier ones across a version boundary. That is intended.
policies:
  refund_window:
    - {days: 30, effective: "2024-01-15"}
    - {days: 45, effective: "2025-11-03", note: "holiday exception made permanent 2026-01-12"}
  restocking_fee:
    - {pct: 10, scope: "opened, non-defective returns", effective: "2024-01-15"}
    - {pct: 10, scope: "opened, non-defective returns; waived on B2B orders of 10+ units", effective: "2025-06-02"}
  free_shipping_threshold:
    - {usd: 75, effective: "2024-03-01"}
    - {usd: 99, effective: "2026-01-15"}
  b2b_discount_tiers:
    - {tier: "15% at 25+ units", effective: "2024-06-01"}
    - {tier: "12% at 30+ units", effective: "2025-12-08", reason: "margin review"}
  discount_exceptions:
    - code: "SL3"
      terms: "sales lead may grant a one-time extra 3% on deals of 30 or more seats"
      approval: >-
        CEO sign-off required when the exception's dollar value reaches the CEO
        approval threshold in expense_policy. On the Cobalt Dental deal the 3%
        was worth 1318.80, above the 1000.00 threshold.
      effective: "2025-10-06"
  warranty:
    - {terms: "1 year standard", effective: "2024-01-15"}
    - {terms: "2 years goodwill extension for Vireo units on firmware v1.2", effective: "2026-01-20", scope: "vireo-v12-affected"}
  shipping_zones:
    effective: "2024-03-01"
    note: "free_shipping_threshold waives light and medium rates only; heavy items always bill the zone rate"
    zones:
      - {zone: "US-1", coverage: "OR WA ID NV", light_usd: 5.95, medium_usd: 12.95, heavy_usd: 49.00}
      - {zone: "US-2", coverage: "CA AZ UT CO NM MT WY", light_usd: 7.95, medium_usd: 15.95, heavy_usd: 69.00}
      - {zone: "US-3", coverage: "central US", light_usd: 9.95, medium_usd: 18.95, heavy_usd: 89.00}
      - {zone: "US-4", coverage: "eastern US", light_usd: 11.95, medium_usd: 21.95, heavy_usd: 109.00}
      - {zone: "CAN", coverage: "Canada", light_usd: 14.95, medium_usd: 29.95, heavy_usd: 149.00}
  price_match:
    - {terms: "no price matching", effective: "2024-01-15"}
    - {terms: "match identical-spec list price from US-based sellers within 14 days of purchase; excludes clearance and bundles", effective: "2025-05-19"}
  pto_policy:
    - {terms: "15 days PTO plus 8 fixed holidays, accrual from day one", effective: "2024-01-15"}
    - {terms: "18 days PTO plus 9 fixed holidays", effective: "2026-01-01"}
  expense_policy:
    - effective: "2024-01-15"
      self_approve_under_usd: 250
      manager_approval_band_usd: "250.00-999.99"
      ceo_approval_from_usd: 1000
      note: "thresholds apply to spend and to discount exceptions measured in dollar value"
    - effective: "2025-07-01"
      self_approve_under_usd: 500
      manager_approval_band_usd: "500.00-999.99"
      ceo_approval_from_usd: 1000
      note: "self-approve limit raised; CEO threshold unchanged"

