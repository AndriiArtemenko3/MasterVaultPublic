    name: "Verdant Textiles Co."
    invoice_code: "VRD"
    country: "Vietnam"
    supplies: "Alder desk mats (all colors), Aspen felt sleeves, Rowan armrest pads"
    payment_terms: "Net-45"
    contract_start: "2023-04-01"
    notes: >-
      Defect saga vendor. LOT-2025-14 (received 2025-06-19) showed edge-stitch
