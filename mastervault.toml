# MasterVault default configuration.
# Every key can be overridden with an MV_* environment variable, e.g.
#   MV_STORAGE__BACKEND=postgres  MV_LLM__PROVIDER=openai
# Secrets are NEVER read from this file — set OPENAI_API_KEY / ANTHROPIC_API_KEY /
# COHERE_API_KEY / DATABASE_URL in the environment or a local .env.

[storage]
backend = "auto"          # auto | postgres | sqlite  (auto: postgres when DATABASE_URL is reachable, else sqlite)

[embedding]
provider = "local"        # openai | local | mock
model = "BAAI/bge-small-en-v1.5"   # for provider=openai use "text-embedding-3-small"
batch_size = 128
cost_cap_usd = 1.00

[llm]
provider = "anthropic"    # anthropic | openai | mock
# base_url = ""           # optional override for provider=openai (e.g. a compatible gateway)
model_small = "claude-haiku-4-5-20251001"
model_medium = "claude-sonnet-5"
model_large = "claude-sonnet-5"

[reranker]
backend = "auto"          # auto | local-bge | cohere | mock | null

[retrieval]
k = 10
rrf_k = 60
rerank_pool = 30
mmr_lambda = 0.7

[ingestion]
band_exists = 0.80        # cosine >= : attach claim to existing concept
band_candidate = 0.60     # cosine >= : LLM adjudicates the pairing
max_claims_per_doc = 10

[ask]
max_rounds = 3
budget_usd = 0.25

[budgets]                 # per-run defaults, USD
ingest = 5.00
lint = 0.50
deliberate = 0.75

[paths]
workspace = "./vault_workspace"
